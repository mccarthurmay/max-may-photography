<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximillian May - Portfolio</title>
    <link rel="stylesheet" href="css/photography.css">
</head>
<body>
    <!-- Navigation Header -->
    <nav id="main-nav">
        <div id="nav-name">MAXIMILLIAN MAY</div>
        <div id="nav-links">
            <a href="photography.html#favorites" class="nav-link" data-view="favorites">Favorites</a>
            <a href="photography.html" class="nav-link active" data-view="grid">Grid</a>
            <a href="rugby.html" class="nav-link">Rugby</a>
<a href="map.html" class="nav-link">Map</a>
            <a href="about.html" class="nav-link">About</a>
            <a href="https://www.instagram.com/max_mayy/" target="_blank" id="nav-instagram" class="nav-link">
                <img src="assets/images/instagram.png" alt="Instagram" class="instagram-icon">
            </a>
        </div>
    </nav>

    <!-- Filter Bar -->
    <div id="filter-bar">
        <div id="filter-controls">
            <button class="filter-pill" id="pill-year" data-filter="year">
                <span class="pill-label">Year</span>
            </button>
            <div class="filter-divider"></div>
            <button class="filter-pill" id="pill-location" data-filter="location">
                <span class="pill-label">Country</span>
            </button>
            <div class="filter-divider"></div>
            <button class="filter-pill" id="pill-subject" data-filter="subject">
                <span class="pill-label">Subject</span>
            </button>
            <button class="filter-pill reset-pill" id="pill-reset" style="display:none">
                <span class="pill-icon">↺</span>
                <span class="pill-label">Reset</span>
            </button>
        </div>
    </div>

    <!-- Filter Dropdowns (rendered outside controls for positioning) -->
    <div class="filter-dropdown" id="dropdown-year"></div>
    <div class="filter-dropdown" id="dropdown-location"></div>
    <div class="filter-dropdown" id="dropdown-subject"></div>

    <!-- Grid View -->
    <div id="portfolio-view" class="view-container active" style="display: block; overflow-y: auto;">
        <div id="portfolio-grid"></div>
    </div>

    <!-- Photo lightbox -->
    <div id="photo-lightbox" class="hidden">
        <div id="lightbox-backdrop"></div>
        <div id="lightbox-content">
            <img id="lightbox-image" src="" alt="">
            <div id="lightbox-info" class="hidden">
                <div id="lightbox-info-inner">
                    <div class="info-row" id="info-location" style="display:none">
                        <span class="info-label">Location</span>
                        <span class="info-value" id="info-location-val"></span>
                    </div>
                    <div class="info-row" id="info-date" style="display:none">
                        <span class="info-label">Date</span>
                        <span class="info-value" id="info-date-val"></span>
                    </div>
                    <div class="info-row" id="info-camera" style="display:none">
                        <span class="info-label">Camera</span>
                        <span class="info-value" id="info-camera-val"></span>
                    </div>
                    <div class="info-row" id="info-lens" style="display:none">
                        <span class="info-label">Lens</span>
                        <span class="info-value" id="info-lens-val"></span>
                    </div>
                    <div class="info-row" id="info-focal" style="display:none">
                        <span class="info-label">Focal Length</span>
                        <span class="info-value" id="info-focal-val"></span>
                    </div>
                    <div class="info-row" id="info-aperture" style="display:none">
                        <span class="info-label">Aperture</span>
                        <span class="info-value" id="info-aperture-val"></span>
                    </div>
                    <div class="info-row" id="info-shutter" style="display:none">
                        <span class="info-label">Shutter</span>
                        <span class="info-value" id="info-shutter-val"></span>
                    </div>
                    <div class="info-row" id="info-iso" style="display:none">
                        <span class="info-label">ISO</span>
                        <span class="info-value" id="info-iso-val"></span>
                    </div>
                </div>
            </div>
        </div>
        <button id="lightbox-close">×</button>
    </div>

    <!-- Main entry -->
    <script type="module" src="js/photography/photo-portfolio-main.js"></script>
</body>
</html>
